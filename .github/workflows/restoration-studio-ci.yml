name: Restoration Studio CI

on:
  push:
    paths:
      - 'restoration-studio/**'
      - '.github/workflows/restoration-studio-ci.yml'
  pull_request:
    paths:
      - 'restoration-studio/**'
      - '.github/workflows/restoration-studio-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: restoration-studio/v0.5.0/worker/pyproject.toml
      - name: Assemble and check readable frontend release
        run: |
          python - <<'PY'
          import json, pathlib
          root=pathlib.Path('restoration-studio/v0.5.0')
          manifest=json.loads((root/'source-manifest.json').read_text())
          for group in ('app','imageWorker'):
              text=''.join((root/p.lstrip('/')).read_text() for p in manifest[group])
              pathlib.Path(f'/tmp/{group}.js').write_text(text)
          for group in ('main','styles','privacy','terms','security','help'):
              text=''.join((root/p.lstrip('/')).read_text() for p in manifest[group])
              assert text.strip(), group
          PY
          node --check /tmp/app.js
          node --check /tmp/imageWorker.js
      - name: Install FFmpeg and worker
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install -e 'restoration-studio/v0.5.0/worker[test]'
      - name: Run worker tests
        working-directory: restoration-studio/v0.5.0/worker
        run: python -m pytest -q
      - name: Dependency consistency
        run: python -m pip check
